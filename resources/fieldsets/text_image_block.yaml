title: 'Text Image Block'
fields:
  -
    handle: heading
    field:
      type: text
      display: Heading
  -
    handle: content
    field:
      buttons:
        - h2
        - h3
        - bold
        - italic
        - unorderedlist
        - orderedlist
        - removeformat
        - quote
      container: assets
      remove_empty_nodes: false
      type: bard
      display: Content
  -
    handle: image
    field:
      container: assets
      max_files: 1
      type: assets
      display: Image
