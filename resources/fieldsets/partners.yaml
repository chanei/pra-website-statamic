title: Partners
fields:
  -
    handle: heading
    field:
      type: text
      display: Heading
  -
    handle: partners
    field:
      type: replicator
      display: Partners
      sets:
        new_set_group:
          display: 'New Set Group'
          sets:
            new_set:
              display: 'New Set'
              fields:
                -
                  handle: partner_name
                  field:
                    type: text
                    display: 'Partner Name'
                -
                  handle: logo
                  field:
                    container: assets
                    max_files: 1
                    type: assets
                    display: Logo
                -
                  handle: website_url
                  field:
                    type: link
                    display: 'Website Url'
