title: 'Action Cards'
fields:
  -
    handle: heading
    field:
      type: text
      display: Heading
  -
    handle: action_cards
    field:
      type: replicator
      display: 'Action cards'
      sets:
        new_set_group:
          display: 'New Set Group'
          sets:
            new_set:
              display: 'New Set'
              fields:
                -
                  handle: title
                  field:
                    type: text
                    display: Title
                -
                  handle: description
                  field:
                    type: textarea
                    display: Description
                -
                  handle: link
                  field:
                    type: link
                    display: Link
                -
                  handle: button_label
                  field:
                    type: text
                    display: 'Button Label'
