title: Programs
fields:
  -
    handle: heading
    field:
      type: text
      display: Heading
  -
    handle: sub_heading
    field:
      type: textarea
      display: 'Sub Heading'
  -
    handle: program_image
    field:
      container: assets
      type: assets
      display: 'Program Image'
      max_files: 1
  -
    handle: section_items
    field:
      type: replicator
      display: 'Section Items'
      sets:
        new_set_group:
          display: 'New Set Group'
          sets:
            new_set:
              display: 'New Set'
              fields:
                -
                  handle: number
                  field:
                    type: text
                    display: Number
                -
                  handle: title
                  field:
                    type: text
                    display: Title
                -
                  handle: context
                  field:
                    type: textarea
                    display: Context
                -
                  handle: link
                  field:
                    collections:
                      - pages
                    type: link
                    display: Link
