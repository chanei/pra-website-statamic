title: Theme
tabs:
  general:
    display: General
    sections:
      -
        fields:
          -
            handle: logo
            field:
              container: assets
              mode: grid
              max_files: 1
              type: assets
              display: Logo
          -
            handle: address
            field:
              type: textarea
              display: Address
          -
            handle: phone_number
            field:
              type: text
              display: 'Phone Number'
          -
            handle: email
            field:
              type: text
              display: Email
          -
            handle: footer_logo
            field:
              container: assets
              max_files: 1
              type: assets
              display: 'Footer Logo'
          -
            handle: social_links
            field:
              type: replicator
              display: 'Social Links'
              sets:
                new_set_group:
                  display: 'New Set Group'
                  sets:
                    new_set:
                      display: 'New Set'
                      fields:
                        -
                          handle: platform
                          field:
                            options:
                              -
                                key: facebook
                                value: Facebook
                              -
                                key: twitter
                                value: 'Twitter (X)'
                              -
                                key: instagram
                                value: Instagram
                              -
                                key: linkedin
                                value: LinkedIn
                              -
                                key: youtube
                                value: Youtube
                              -
                                key: tiktok
                                value: Tiktok
                              -
                                key: whatsapp
                                value: Whatsapp
                            type: select
                            display: Platform
                        -
                          handle: url
                          field:
                            input_type: url
                            type: text
                            display: Url
