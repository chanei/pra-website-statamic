title: 'Lessons Learned'
tabs:
  main:
    display: Main
    sections:
      -
        fields:
          -
            handle: title
            field:
              type: text
              required: true
              validate:
                - required
              display: Title
          -
            handle: excerpt
            field:
              type: textarea
              display: Excerpt
          -
            handle: content
            field:
              container: assets
              remove_empty_nodes: false
              type: bard
              display: Content
          -
            handle: authors
            field:
              type: text
              display: Authors
          -
            handle: featured_image
            field:
              container: assets
              type: assets
              display: 'Featured Image'
  sidebar:
    display: Sidebar
    sections:
      -
        fields:
          -
            handle: slug
            field:
              type: slug
              localizable: true
              validate: 'max:200'
