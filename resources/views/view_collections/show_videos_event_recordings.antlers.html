<article class="px-6 md:px-14 lg:px-20 py-16">
    <div class="max-w-3xl mx-auto">

        <h1 class="text-4xl font-bold mb-4">{{ title }}</h1>

        {{ if video_url }}
            <div class="mb-6">
                <iframe
                    class="w-full h-96"
                    src="{{ video_url | embed_url }}"
                    frameborder="0"
                    allowfullscreen>
                </iframe>
            </div>
        {{ /if }}

        {{ if description }}
            <p class="mb-4">{{ description }}</p>
        {{ /if }}

        {{ if duration }}
            <p class="text-sm text-gray-500">{{ duration }}</p>
        {{ /if }}

    </div>
</article>
