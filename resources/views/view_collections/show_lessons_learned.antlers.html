<article class="px-6 md:px-14 lg:px-20 py-16">

    <div class="max-w-3xl mx-auto">

        {{ if featured_image }}
            {{ featured_image }}
                <img src="{{ url }}" class="w-full h-auto object-cover mb-6" alt="{{ title }}" />
            {{ /featured_image }}
        {{ /if }}

        <h1 class="text-4xl font-bold mb-4">
            {{ title }}
        </h1>

        {{ if authors }}
            <div class="flex flex-wrap gap-2 mb-4">
                <span class="text-xs uppercase text-gray-400">Authors</span>

                {{ authors | explode(',') }}
                    <span class="bg-gray-100 text-gray-700 text-sm px-3 py-1 rounded-full">
                        {{ value }}
                    </span>
                {{ /authors }}
            </div>
        {{ /if }}

        <div class="prose max-w-none">
            {{ content }}
        </div>

    </div>

</article>
