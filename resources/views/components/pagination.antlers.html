<div class="flex items-center justify-center gap-2 mt-12">
    {{ if prev_page }}
    <a href="{{ prev_page }}" class="flex items-center justify-center h-10 w-10 rounded-full border border-orange-400 text-orange-500 hover:bg-orange-500 hover:text-white transition-colors">
        <svg
            class="w-4 h-4"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
        >
            <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M15 19l-7-7 7-7"
            />
        </svg>
    </a>
    {{ else }}
    <span class="flex items-center justify-center h-10 w-10 rounded-full border border-gray-200 text-gray-300 cursor-not-allowed">
        <svg
            class="w-4 h-4"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
        >
            <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M15 19l-7-7 7-7"
            />
        </svg>
    </span>
    {{ /if }}
    <!-- Page Numbers -->
    {{ pages }}
                    {{ if is_current }}
    <span class="flex items-center justify-center h-10 w-10 rounded-full bg-orange-500 text-white text-sm font-medium">
        {{ number }}
    </span>
    {{ else }}
    <a href="{{ url }}" class="flex items-center justify-center h-10 w-10 rounded-full border border-gray-200 text-gray-600 text-sm hover:border-orange-400 hover:text-orange-500 transition-colors">
        {{ number }}
    </a>
    {{ /if }}
                {{ /pages }}
    <!-- Next -->
    {{ if next_page }}
    <a href="{{ next_page }}" class="flex items-center justify-center h-10 w-10 rounded-full border border-orange-400 text-orange-500 hover:bg-orange-500 hover:text-white transition-colors">
        <svg
            class="w-4 h-4"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
        >
            <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M9 5l7 7-7 7"
            />
        </svg>
    </a>
    {{ else }}
    <span class="flex items-center justify-center h-10 w-10 rounded-full border border-gray-200 text-gray-300 cursor-not-allowed">
        <svg
            class="w-4 h-4"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
        >
            <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M9 5l7 7-7 7"
            />
        </svg>
    </span>
    {{ /if }}
</div>
