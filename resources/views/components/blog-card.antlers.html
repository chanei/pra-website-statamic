<div class="bg-white shadow-lg rounded-lg overflow-hidden">
    {{ if featured_image }}
        {{ featured_image }}
            <img src="{{ url }}" class="w-full h-48 object-cover" alt="{{ title }}" />
        {{ /featured_image }}
    {{ /if }}
    <div class="p-6">
        <a href="{{ url }}" class="text-xl font-bold mb-2">{{ title }}</a>
        <p class="text-gray-700 mb-4">{{ excerpt }}</p>
        <a href="{{ url }}" class="text-orange-500 font-medium hover:underline"
            >Read More →</a
        >
    </div>
</div>
