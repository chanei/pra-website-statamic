<div
    class="grid grid-cols-1 md:grid-cols-2 gap-6 px-6 md:px-14 lg:px-20 mt-30 mb-20"
>
    <div class="mt-30">
        <h3 class="text-3xl font-bold mb-2">{{ heading }}</h3>
        <div class="mb-8 font-light">
            {{ content | raw | bard_html }}
        </div>
    </div>
    <div class="max-h-[600px] items-end">
        <div class="flex-1 relative h-auto md:h-[600px]">
            <img
                src="{{ image }}"
                class="rounded-2xl w-full h-full object-cover"
            />
            <div class="absolute inset-0 bg-black/50 rounded-2xl"></div>
        </div>
    </div>
</div>
