<div class="bg-white shadow-lg rounded-lg overflow-hidden">
    {{ featured_image }}
        <img src="{{ url }}" class="w-full h-48 object-cover" />
    {{ /featured_image }}

    <div class="p-6">
        <h3 class="text-xl font-bold mb-2">{{ title }}</h3>

        <p class="text-sm text-gray-500 mb-2">
            {{ start_date format="M j" }} - {{ end_date format="M j, Y" }}
        </p>

        {{ if time }}
            <p class="text-sm mb-4">{{ time }}</p>
        {{ /if }}

        <a href="{{ url }}" class="text-orange-500 hover:underline">
            View Event →
        </a>
    </div>
</div>
