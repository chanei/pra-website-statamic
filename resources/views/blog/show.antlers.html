<article class="px-6 md:px-14 lg:px-20 py-16">

    <div class="max-w-3xl mx-auto">
        {{ if featured_image }}
            {{ featured_image }}
                <img src="{{ url }}" class="w-full h-auto object-cover" alt="{{ title }}" />
            {{ /featured_image }}
        {{ /if }}

        <h1 class="text-4xl font-bold mt-4 mb-4">
            {{ title }}
        </h1>

        <div class="prose max-w-none">
            {{ content }}
        </div>

    </div>

</article>
