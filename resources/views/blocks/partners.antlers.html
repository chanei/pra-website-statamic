<div class="px-6 md:px-14 lg:px-20 py-20 bg-white">

    {{ if heading }}
    <div class="flex flex-col items-center mb-16">
        <h2 class="text-3xl font-bold text-center mb-4">
            {{ heading }}
        </h2>

        <div class="flex items-center gap-2">
            <div class="h-[2px] w-12 bg-orange-300 rounded-full"></div>
            <div class="h-[3px] w-6 bg-orange-500 rounded-full"></div>
            <div class="h-[2px] w-12 bg-orange-300 rounded-full"></div>
        </div>
    </div>
    {{ /if }}

    <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-10 items-center">

        {{ partners }}

            {{ if website_url }}
                <a href="{{ website_url }}" target="_blank" class="flex justify-center opacity-80 hover:opacity-100 transition">
            {{ else }}
                <div class="flex justify-center opacity-80">
            {{ /if }}

                {{ logo }}
                    <img
                        src="{{ glide:logo width='220' height='120' fit='contain' }}"
                        alt="{{ partner_name }}"
                        class="max-h-16 object-contain grayscale hover:grayscale-0 transition"
                    />
                {{ /logo }}

            {{ if website_url }}
                </a>
            {{ else }}
                </div>
            {{ /if }}

        {{ /partners }}

    </div>

</div>
