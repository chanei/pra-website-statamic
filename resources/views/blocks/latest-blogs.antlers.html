<div class="flex flex-col px-6 md:px-14 lg:px-20 py-24 bg-white">
    <div class="flex flex-col items-center mb-16">
        <h1 class="text-3xl text-center font-bold mb-4">{{ heading }}</h1>
        <div class="flex items-center gap-2">
            <div class="h-[2px] w-12 bg-orange-300 rounded-full"></div>
            <div class="h-[3px] w-6 bg-orange-500 rounded-full"></div>
            <div class="h-[2px] w-12 bg-orange-300 rounded-full"></div>
        </div>
    </div>
    <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-8">
        {{ collection:blog limit="{limit}" sort="date:desc" paginate="true" as="posts" }}
            {{ posts }}
                {{ partial:components/blog-card }}
            {{ /posts }}
        {{ /collection:blog }}
    </div>
</div>
