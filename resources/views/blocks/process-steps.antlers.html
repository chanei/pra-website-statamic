<div class="flex flex-col px-6 md:px-14 lg:px-20 pb-24 pt-10 bg-gray-50">
    <div class="flex flex-col items-center mb-16">
        <h1 class="text-3xl text-center font-bold mb-4">{{ heading }}</h1>
        <div class="flex items-center gap-2">
            <div class="h-[2px] w-12 bg-orange-300 rounded-full"></div>
            <div class="h-[3px] w-6 bg-orange-500 rounded-full"></div>
            <div class="h-[2px] w-12 bg-orange-300 rounded-full"></div>
        </div>
    </div>
    <div class="flex flex-wrap justify-center gap-8">
        {{ numbered_steps }}
        <div
            class="w-full sm:w-[45%] lg:w-[22%] max-w-sm flex flex-col items-center text-center p-6"
        >
            <div class="text-orange-500 font-bold text-3xl mb-4">
                {{ if index + 1 < 10 }}
                    0{{ index + 1 }}
                {{ else }}
                    {{ index + 1 }}
                {{ /if }}
            </div>
            {{ if title }}
                <h3 class="text-lg font-semibold mb-3">{{ title }}</h3>
            {{ /if }}
            <p class="text-sm text-gray-600 leading-relaxed">
                {{ description }}
            </p>
        </div>
        {{ /numbered_steps }}
    </div>
</div>
