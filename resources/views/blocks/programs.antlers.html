<div class="flex flex-col md:flex-row gap-12 px-6 md:px-14 lg:px-20 pt-20 mb-20">
    <div class="flex w-full md:w-[45%] max-h-[600px]">
        <div class="w-full h-[600px] relative rounded-xl overflow-hidden">
            {{ program_image }}
            <img src="{{ program_image }}" class="w-full h-full object-center" />
            {{ /program_image }}
            <div class="absolute inset-0 bg-black/40 rounded-2xl"></div>
        </div>
    </div>
    <div class="w-full md:w-[55%]">
        <div class="flex flex-col mb-6">
            <h1 class="text-xl md:text-3xl font-bold mb-6">{{ heading }}</h1>
            <div class="flex items-center gap-2">
                <div class="h-[2px] w-12 bg-orange-300 rounded-full"></div>
                <div class="h-[3px] w-6 bg-orange-500 rounded-full"></div>
                <div class="h-[2px] w-12 bg-orange-300 rounded-full"></div>
            </div>
        </div>
        <p class="font-light mb-6">
            {{ sub_heading }}
        </p>
        {{ section_items }}
        <div class="flex gap-4 mb-8">
            <div class="flex">
                <div class="flex items-center justify-center bg-orange-300 text-white h-12 w-12 rounded-full">{{ number }}</div>
            </div>
            <div class="flex flex-col">
                <h6 class="font-bold">{{ title }}</h6>
                <p class="font-light">
                    {{ context }}
                </p>
                {{ if link }}
                    <button class="w-fit text-sm text-left bg-orange-400 text-white mt-2 px-4 py-1 rounded-full">
                        <a href="{{ link }}">Learn more</a>
                    </button>
                {{ /if }}
            </div>
        </div>
        {{ /section_items }}
    </div>
</div>
