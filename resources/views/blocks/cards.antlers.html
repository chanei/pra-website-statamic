<div class="flex flex-col px-6 md:px-14 lg:px-20 py-24">
    <h1 class="text-3xl text-center font-bold mb-16">{{ heading }}</h1>
    <div
        class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8 justify-between"
    >
        {{ cards }}
        <div
            class="flex-1 flex flex-col items-center justify-center bg-white shadow-lg rounded-2xl p-6"
        >
            <div
                class="flex items-center justify-center bg-orange-300 h-20 w-20 rounded-full mb-6"
            >
                <img src="{{ icon }}" class="h-8" />
            </div>
            <h1 class="text-md font-bold mb-4">{{ heading }}</h1>
            <p class="text-center font-light">{{ sub_heading }}</p>
        </div>
        {{ /cards}}
    </div>
    <div
        class="flex justify-center mt-16 mx-auto bg-white shadow-lg rounded-2xl p-8 md:p-14"
    >
        <h2 class="text-xl md:text-2xl text-center">{{text}}</h2>
    </div>
</div>
