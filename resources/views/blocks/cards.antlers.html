<div class="flex flex-col px-6 md:px-14 lg:px-20 pb-24 pt-10 bg-white">
    <div class="flex flex-col items-center mb-16">
        <h1 class="text-3xl text-center font-bold mb-4">
            {{ heading }}
        </h1>
        <div class="flex items-center gap-2">
            <div class="h-[2px] w-12 bg-orange-300 rounded-full"></div>
            <div class="h-[3px] w-6 bg-orange-500 rounded-full"></div>
            <div class="h-[2px] w-12 bg-orange-300 rounded-full"></div>
        </div>
    </div>
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">

        {{ cards }}
        <div class="flex flex-col bg-white shadow-lg rounded-2xl p-6 border-t-4 border-orange-400 hover:shadow-xl transition">
            <div class="flex items-center justify-center bg-orange-100 h-16 w-16 rounded-full mb-4 mx-auto">
                <img src="{{ icon }}" class="h-7" />
            </div>
            <h3 class="text-lg font-semibold text-center mb-3">
                {{ heading }}
            </h3>
            <div class="flex justify-center mb-4">
                <div class="h-[2px] w-10 bg-orange-300 rounded-full"></div>
            </div>
            <p class="text-sm text-gray-600 text-center leading-relaxed">
                {{ sub_heading }}
            </p>

        </div>
        {{ /cards }}

    </div>
    {{ if text }}
    <div class="flex justify-center mt-20">
        <div class="max-w-3xl text-center">

            <p class="text-xl md:text-2xl font-medium text-gray-800 leading-relaxed">
                {{ text }}
            </p>

            <div class="flex justify-center mt-6">
                <div class="h-[3px] w-12 bg-orange-400 rounded-full"></div>
            </div>

        </div>
    </div>
    {{ /if }}
</div>
